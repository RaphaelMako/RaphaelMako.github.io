<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            background-color: white;
            margin: 0;
            padding: 0;
            overflow: hidden;
            /* Prevents scrollbars from appearing */
        }

        canvas {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        #controls {
            position: absolute;
            width: 100%;
            bottom: 10px;
            background-color: white;
            padding: 30px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: center;
        }

        label {
            padding-left: 15px;
            padding-right: 15px;

        }

        #loop {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 10px;
            border-radius: 5px;
            background-color: white;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            cursor: pointer;
        }
    </style>
</head>

<body>

    <canvas id="boids"></canvas>
    <button id="loop"> Loop it up</button>
    <div id="controls">
        <label>Number of Boids: <input type="range" id="numBoids" min="50" max="200" step="10" value="100"></label>
        <label>Max Speed: <input type="range" id="maxSpeed" min="0" max="10" step="0.1" value="1"></label>
        <label>Coherence: <input type="range" id="coherence" min="0" max="10" step="0.5" value="5"></label>
        <label>Separation: <input type="range" id="separation" min="0" max="10" step="0.1" value="1"></label>
        <label>Alignment: <input type="range" id="alignment" min="0" max="10" step="0.1" value="1"></label>
        <label>Visual Range: <input type="range" id="visualRange" min="0" max="100" step="1" value="50"></label>

    </div>
    <script src="boids.js"></script>
</body>

</html>
